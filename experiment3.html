<!DOCTYPE html>
<html>
<head>
<title>CSS Grid Layout Example</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
}

.container{
    display:grid;

    grid-template-areas:
        "header header header"
        "menu main sidebar"
        "footer footer footer";

    grid-template-columns: 1fr 2fr 1fr;
    grid-template-rows: 100px 300px 80px;

    gap:10px;
    padding:10px;
}

.header{
    grid-area:header;
    background-color: rgba(142, 205, 216, 0.7);
    text-align:center;
    padding-top:35px;
    font-size:24px;
}

.menu{
    grid-area:menu;
    background-color: rgba(72, 97, 48, 0.7);
    padding:20px;
}

.main{
    grid-area:main;
    background-color: rgba(214, 198, 103, 0.7);
    padding:20px;
}

.sidebar{
    grid-area:sidebar;
    background-color: rgba(176, 63, 63, 0.7);
    padding:20px;
}

.footer{
    grid-area:footer;
    background-color: rgba(49, 172, 141, 0.7);
    text-align:center;
    padding-top:30px;
}
.header,.menu,.main,.sidebar,.footer{
    border-radius: 15px;
    text-align:center;
}
button {
                background-color: rgba(255, 255, 255, 0.7);
                color: #333;
                padding: 10px;
                border: none;
                
                border-radius: 15px; 
                cursor:pointer;
                box-shadow: 5px 5px 15px black;
            }

@media (max-width: 600px) {
    .container {
        grid-template-areas:
            "header"
            "menu"
            "main"
            "sidebar"
            "footer";
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto auto;
    }

    .header, .footer {
        padding-top: 20px;
        padding-bottom: 20px;
    }
}

.button{
    text-align: center;
}

body{
    background: linear-gradient(to right, lightblue, lightpink);
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>My Website</h2>
    </div>

    <div class="menu">
        <h3>Menu</h3>
        <p>Home</p>
        <p>About</p>
        <p>Contact</p>
    </div>

    <div class="main">
        <h3>Main Content</h3>
        <p>This is the main content area of the web page.</p>
    </div>

    <div class="sidebar">
        <h3>Sidebar</h3>
        <p>Additional information</p>
    </div>

    <div class="footer">
        Footer Section
    </div>

</div>
<div class="button">
            <button onclick="changeBackground()">Change Backgrounds</button>
</div>


<script>
    
                let backgrounds = [
                "linear-gradient(to right, lightblue, lightpink)",
                "url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop')",
                "url('https://thumbs.dreamstime.com/b/sleek-home-office-setup-features-multiple-screens-displaying-code-backlit-keyboard-adds-vibrancy-enhanced-neon-372650307.jpg?w=992')",
                "url('https://thumbs.dreamstime.com/b/home-office-setup-features-coding-multiple-screens-backlit-keyboard-dark-atmosphere-enhanced-neon-lights-372650947.jpg?w=992')"
                ];

                 let current = 1;
                


               


                function changeBackground(){
                    document.body.style.background = backgrounds[current];

                    

                    current++;
                    
                    if(current >= backgrounds.length){
                        current = 0;
                    }

                    
                }
</script>

</body>


</html>
