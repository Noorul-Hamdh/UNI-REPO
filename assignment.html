<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>

body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:250px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    padding:20px;
    border-radius:10px;
}

.card img{
    width:100%;
    border-radius:10px;
}

button{
    background-color:orange;
    border:none;
    padding:10px 15px;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

</style>
</head>

<body>

<div class="card">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSI_A5Wpa9ff7Ote5arkGDkrPs6PYo2HQigTQ&s" alt="profile">

<h3>JOHN DOE</h3>
<p>Web Developer</p>

<button>FOLLOW</button>

</div>

</body>
</html>
