<!DOCTYPE html>
<html>
    <head>
        <title>
            Add
        </title>
        <style>
           html, body{
                height:100%;
                margin:0;
            }

            body{
                display:flex;
                justify-content:center;
                align-items:center;
                background: linear-gradient(to right,#9ec5d1,#eaa0ad);
            }

            .container{
                background:#f5efe7;
                padding:40px;
                width:300px;
                text-align:center;

                border-radius:20px;
                box-shadow:0 10px 25px rgba(0,0,0,0.2);
            }

            input{
                width:120px;
                padding:5px;
            }
        </style>
    </head>
    <body>
        <div class = "container">
        <label>Enter Number 1:</label><br>
        <input type="text" id="num1"><br><br>
        <label>Enter Number 2:</label><br>
        <input type="text" id="num2"><br><br>

        <button onclick="add()">Add</button><br><br>

        <label>Result = </label><p id="result"> </p>
        </div>
        <script>

            function add(){
                var a = Number(document.getElementById("num1").value);
                var b = Number(document.getElementById("num2").value);

                var sum = a + b;

                document.getElementById("result").innerHTML = sum;
            }
        </script>
    </body>
</html>
